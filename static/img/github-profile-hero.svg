<svg width="1200" height="280" viewBox="0 0 1200 280" fill="none" xmlns="http://www.w3.org/2000/svg">
  <style>
    .bg   { fill: #f6f8fa; }
    .card { fill: #ffffff; stroke: #d0d7de; }
    .bar  { fill: #1f2328; }
    .txt  { fill: #1f2328; font-family: 'Segoe UI', Ubuntu, 'Helvetica Neue', sans-serif; }
    .dim  { fill: #656d76; font-family: 'Segoe UI', Ubuntu, 'Helvetica Neue', sans-serif; }
    .mono { font-family: ui-monospace, SFMono-Regular, 'SF Mono', Menlo, Consolas, monospace; }
    @media (prefers-color-scheme: dark) {
      .bg   { fill: #161b22; }
      .card { fill: #21262d; stroke: #30363d; }
      .bar  { fill: #e6edf3; }
      .txt  { fill: #e6edf3; }
      .dim  { fill: #848d97; }
    }
  </style>

  <!-- Page background -->
  <rect class="bg" width="1200" height="280"/>

  <!-- Card frame -->
  <rect class="card" x="20" y="20" width="1160" height="240" rx="6" stroke-width="1"/>

  <!-- Top bar -->
  <rect class="bar" x="20" y="20" width="1160" height="32" rx="6"/>
  <rect class="bar" x="20" y="40" width="1160" height="12"/>
  <text class="txt mono" fill="#ffffff" font-size="12" font-weight="600" letter-spacing="1" x="40" y="42">HKIMW · PERSONAL ACCOUNT → PCCX AI ORG</text>
  <!-- Window controls -->
  <circle cx="1134" cy="36" r="5" fill="#ffffff" fill-opacity="0.25"/>
  <circle cx="1150" cy="36" r="5" fill="#ffffff" fill-opacity="0.25"/>
  <circle cx="1166" cy="36" r="5" fill="#ffffff" fill-opacity="0.25"/>

  <!-- Divider lines -->
  <line class="card" x1="40" y1="72" x2="1160" y2="72" stroke-width="1"/>
  <line class="card" x1="40" y1="220" x2="1160" y2="220" stroke-width="1"/>

  <!-- Left text block -->
  <text class="txt" font-size="30" font-weight="700" letter-spacing="0.5" x="52" y="114">hkimw</text>
  <text class="dim" font-size="14" font-weight="400" x="52" y="140">personal notes · baselines · website source</text>
  <text class="dim" font-size="14" font-weight="400" x="52" y="162">pccxai org · FPGA NPU · LLM inference · verification tooling</text>

  <!-- Bottom prompt -->
  <text class="dim mono" font-size="12" font-weight="500" x="52" y="244">$ open github.com/pccxai</text>
  <text class="dim mono" font-size="12" font-weight="500" x="640" y="244">SystemVerilog · C++ · Python · TypeScript · Rust</text>

  <!-- PCCX logo — centered vertically in card body (72..220 → center 146) -->
  <!-- Mark: vertically centered at y=146, horizontally at x≈1040 -->
  <g transform="translate(950, 76)">
    <!-- pccx mark (scaled up) -->
    <polyline points="28,54 28,28 108,28 108,54" stroke-width="5" stroke-linecap="square" stroke-linejoin="miter" fill="none" class="card" style="stroke:currentColor"/>
    <polyline points="28,86 28,112 108,112 108,86" stroke-width="5" stroke-linecap="square" stroke-linejoin="miter" fill="none" class="card" style="stroke:currentColor"/>
    <rect class="bar" x="62" y="10" width="16" height="120"/>
    <rect class="bar" x="59" y="10" width="22" height="6"/>
    <rect class="bar" x="59" y="124" width="22" height="6"/>
  </g>
  <text class="txt" font-size="52" font-weight="700" letter-spacing="1" x="1078" y="165">pccx</text>
</svg>

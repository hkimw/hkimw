<svg width="1200" height="760" viewBox="0 0 1200 760" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="title desc">
  <title id="title">hkimw classic system profile</title>
  <desc id="desc">A monochrome classic Macintosh style profile window for hkimw.</desc>
  <defs>
    <style>
      .ui { font-family: Chicago, Charcoal, "Geneva", "Helvetica Neue", Arial, sans-serif; }
      .mono { font-family: Monaco, "Courier New", ui-monospace, monospace; }
      .text { fill: #000000; }
      .soft { fill: #444444; }
      .small { font-size: 17px; }
      .tiny { font-size: 14px; }
    </style>
    <pattern id="desktop" width="8" height="8" patternUnits="userSpaceOnUse">
      <rect width="8" height="8" fill="#b7b7b7"/>
      <rect width="4" height="4" fill="#8f8f8f"/>
      <rect x="4" y="4" width="4" height="4" fill="#8f8f8f"/>
    </pattern>
    <pattern id="bar-empty" width="6" height="6" patternUnits="userSpaceOnUse">
      <rect width="6" height="6" fill="#777777"/>
      <path d="M0 6L6 0" stroke="#000000" stroke-width="1"/>
    </pattern>
    <pattern id="title-stripes" width="6" height="6" patternUnits="userSpaceOnUse">
      <rect width="6" height="6" fill="#ffffff"/>
      <path d="M0 1H6M0 4H6" stroke="#000000" stroke-width="1"/>
    </pattern>
    <pattern id="shade" width="4" height="4" patternUnits="userSpaceOnUse">
      <rect width="4" height="4" fill="#d8d8d8"/>
      <rect width="2" height="2" fill="#ffffff"/>
      <rect x="2" y="2" width="2" height="2" fill="#ffffff"/>
    </pattern>
  </defs>

  <rect width="1200" height="760" fill="url(#desktop)"/>

  <rect x="0" y="0" width="1200" height="30" fill="#ffffff"/>
  <line x1="0" y1="30" x2="1200" y2="30" stroke="#000000" stroke-width="2"/>
  <text class="ui text" x="22" y="21" font-size="17" font-weight="700">hkimw</text>
  <text class="ui text" x="112" y="21" font-size="17">File</text>
  <text class="ui text" x="170" y="21" font-size="17">Edit</text>
  <text class="ui text" x="228" y="21" font-size="17">View</text>
  <text class="ui text" x="294" y="21" font-size="17">Special</text>

  <g transform="translate(34 64)">
    <rect x="10" y="10" width="716" height="284" fill="#000000"/>

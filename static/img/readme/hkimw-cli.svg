  <rect x="338" y="392" width="427" height="20" rx="2" fill="#56d364"/>
  <rect x="757" y="392" width="8" height="20" fill="#f0f6fc" opacity="0.95"/>
  <text class="mono fg" x="982" y="410" font-size="16">70%</text>
  <text class="mono muted" x="1044" y="410" font-size="16">active</text>

  <text class="mono fg" x="72" y="454" font-size="16">KV_CACHE_PATH</text>
  <rect x="338" y="436" width="610" height="20" rx="2" fill="url(#bar-empty)" stroke="#30363d"/>
  <rect x="338" y="436" width="378" height="20" rx="2" fill="#58a6ff"/>
  <rect x="708" y="436" width="8" height="20" fill="#f0f6fc" opacity="0.95"/>
  <text class="mono fg" x="982" y="454" font-size="16">62%</text>
  <text class="mono muted" x="1044" y="454" font-size="16">modeling</text>

  <text class="mono fg" x="72" y="498" font-size="16">KV260_BRINGUP</text>
  <rect x="338" y="480" width="610" height="20" rx="2" fill="url(#bar-empty)" stroke="#30363d"/>
  <rect x="338" y="480" width="275" height="20" rx="2" fill="#d2a8ff"/>
  <rect x="605" y="480" width="8" height="20" fill="#f0f6fc" opacity="0.95"/>
  <text class="mono fg" x="982" y="498" font-size="16">45%</text>
  <text class="mono muted" x="1044" y="498" font-size="16">lab</text>

  <text class="mono fg" x="72" y="542" font-size="16">DRIVER_STACK</text>
  <rect x="338" y="524" width="610" height="20" rx="2" fill="url(#bar-empty)" stroke="#30363d"/>
  <rect x="338" y="524" width="232" height="20" rx="2" fill="#ff7b72"/>
  <rect x="562" y="524" width="8" height="20" fill="#f0f6fc" opacity="0.95"/>
  <text class="mono fg" x="982" y="542" font-size="16">38%</text>
  <text class="mono muted" x="1044" y="542" font-size="16">bringup</text>

  <text class="mono fg" x="72" y="586" font-size="16">PUBLIC_NOTES</text>

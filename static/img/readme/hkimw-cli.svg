  <rect x="338" y="348" width="519" height="20" rx="2" fill="#f2cc60"/>
  <rect x="849" y="348" width="8" height="20" fill="#f0f6fc" opacity="0.95"/>
  <text class="mono fg" x="982" y="366" font-size="16">85%</text>
  <text class="mono muted" x="1044" y="366" font-size="16">alpha</text>

  <text class="mono fg" x="72" y="410" font-size="16">VERIFICATION</text>

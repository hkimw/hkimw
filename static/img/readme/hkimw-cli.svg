    <rect x="2" y="2" width="712" height="29" fill="url(#title-stripes)"/>
    <rect x="271" y="3" width="174" height="27" fill="#ffffff"/>
    <text class="ui text" x="288" y="23" font-size="17" font-weight="700">hkimw Profile</text>

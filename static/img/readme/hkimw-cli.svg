<svg width="1200" height="780" viewBox="0 0 1200 780" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="title desc">
  <title id="title">hkimw CLI profile</title>
  <desc id="desc">A colored terminal style GitHub profile for hkimw, showing focus areas, build load bars, workspace repositories, and routes.</desc>
  <defs>
    <style>
      .mono { font-family: ui-monospace, SFMono-Regular, "SF Mono", Menlo, Consolas, "Liberation Mono", monospace; }
      .label { fill: #f2cc60; font-weight: 700; }
      .muted { fill: #8b949e; }
      .fg { fill: #dbe7f3; }
      .cyan { fill: #58a6ff; }
      .green { fill: #56d364; }
      .pink { fill: #ff7bda; }
      .orange { fill: #ffa657; }
    </style>
    <pattern id="bar-empty" width="10" height="10" patternUnits="userSpaceOnUse">
      <rect width="10" height="10" fill="#11161d"/>
      <path d="M0 10L10 0" stroke="#30363d" stroke-width="1"/>
    </pattern>
    <pattern id="scanline" width="6" height="6" patternUnits="userSpaceOnUse">
      <rect width="6" height="6" fill="#070a0f"/>
      <rect width="6" height="1" y="5" fill="#101722" opacity="0.7"/>
    </pattern>
  </defs>

  <rect width="1200" height="780" fill="#05070a"/>
  <rect width="1200" height="780" fill="url(#scanline)" opacity="0.36"/>

  <rect x="22" y="22" width="1156" height="736" rx="10" fill="#0b0f14" stroke="#30363d" stroke-width="2"/>
  <rect x="22" y="22" width="1156" height="46" rx="10" fill="#111720"/>
  <rect x="22" y="56" width="1156" height="12" fill="#111720"/>
  <circle cx="50" cy="45" r="7" fill="#ff5f56"/>
  <circle cx="72" cy="45" r="7" fill="#ffbd2e"/>
  <circle cx="94" cy="45" r="7" fill="#27c93f"/>
  <text class="mono muted" x="124" y="50" font-size="14">hkimw@github:~/pccx-profile</text>
  <text class="mono muted" x="1002" y="50" font-size="14">tty0 / 120x32</text>

  <text class="mono muted" x="54" y="104" font-size="17">$ cat /proc/profile</text>
  <text class="mono label" x="72" y="142" font-size="17">user</text>
  <text class="mono fg" x="190" y="142" font-size="17">hkimw / Hyunwoo Kim</text>
  <text class="mono label" x="72" y="174" font-size="17">role</text>
  <text class="mono fg" x="190" y="174" font-size="17">student building AI accelerators</text>
  <text class="mono label" x="72" y="206" font-size="17">target</text>
  <text class="mono fg" x="190" y="206" font-size="17">memory-bound transformer inference on edge FPGAs</text>
  <text class="mono label" x="72" y="238" font-size="17">stack</text>
  <text class="mono cyan" x="190" y="238" font-size="17">SystemVerilog</text>
  <text class="mono fg" x="348" y="238" font-size="17">/ C++ / CUDA / Python / TypeScript / Rust</text>

  <rect x="770" y="94" width="354" height="164" rx="6" fill="#0f141b" stroke="#253040"/>
  <text class="mono green" x="792" y="128" font-size="16">$ route --list</text>
  <text class="mono muted" x="812" y="164" font-size="15">org</text>
  <text class="mono fg" x="904" y="164" font-size="15">github.com/pccxai</text>
  <text class="mono muted" x="812" y="192" font-size="15">npu</text>
  <text class="mono fg" x="904" y="192" font-size="15">pccxai/pccx</text>
  <text class="mono muted" x="812" y="220" font-size="15">notes</text>
  <text class="mono fg" x="904" y="220" font-size="15">hkimw.github.io/hkimw</text>
  <text class="mono muted" x="812" y="248" font-size="15">blog</text>
  <text class="mono fg" x="904" y="248" font-size="15">engineer log</text>

  <line x1="54" y1="278" x2="1124" y2="278" stroke="#30363d"/>
  <text class="mono muted" x="54" y="318" font-size="17">$ ./build-status --load</text>

  <text class="mono fg" x="72" y="366" font-size="16">PCCX_NPU_RTL</text>

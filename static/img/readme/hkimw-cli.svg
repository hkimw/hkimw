  <rect x="338" y="568" width="171" height="20" rx="2" fill="#ffa657"/>
  <rect x="501" y="568" width="8" height="20" fill="#f0f6fc" opacity="0.95"/>
  <text class="mono fg" x="982" y="586" font-size="16">28%</text>
  <text class="mono muted" x="1044" y="586" font-size="16">draft</text>

  <rect x="54" y="624" width="516" height="96" rx="6" fill="#0f141b" stroke="#253040"/>
  <text class="mono green" x="76" y="656" font-size="15">~/workspace</text>
  <text class="mono muted" x="76" y="684" font-size="14">|-- pccxai/pccx</text>
  <text class="mono fg" x="286" y="684" font-size="14">open NPU architecture</text>
  <text class="mono muted" x="76" y="710" font-size="14">|-- pccxai/pccx-lab</text>
  <text class="mono fg" x="286" y="710" font-size="14">pre-RTL profiler</text>

  <rect x="608" y="624" width="516" height="96" rx="6" fill="#0f141b" stroke="#253040"/>
  <text class="mono pink" x="630" y="656" font-size="15">~/notes</text>
  <text class="mono muted" x="630" y="684" font-size="14">|-- hkimw/hkimw</text>
  <text class="mono fg" x="840" y="684" font-size="14">site source + notebooks</text>
  <text class="mono muted" x="630" y="710" font-size="14">|-- blog/</text>
  <text class="mono fg" x="840" y="710" font-size="14">engineering log</text>

  <text class="mono muted" x="54" y="746" font-size="13">$ uptime: FPGA/NPU systems, edge inference, papers, tools</text>
</svg>
